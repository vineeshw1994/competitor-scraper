name: Competitor Scrape (JSON only)

on:
  workflow_dispatch:
  schedule:
    # 06:00 UK (BST, UTC+1)
    - cron: '0 5 * * *'
    # 06:00 UK (GMT, UTC+0)
    - cron: '0 6 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            chromium-browser \
            fonts-liberation \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libnss3 \
            libxss1

      - name: Run scraper (all 6 sites, JSON artifact)
        run: node scraper.js --dry-run --summary --no-proxy --no-env --out=output/scrape-results.json
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          SCRAPER_THRESHOLD: 50
          DEEP_MAX_COMPS_PER_SITE: 3
          SCRAPER_PROXY: ''

      - name: Import JSON into API (writes Woo DB)
        shell: bash
        run: |
          set -euo pipefail
          echo "Posting output/scrape-results.json to import API..."
          HTTP_CODE=$(curl -sS -o import-response.json -w "%{http_code}" \
            -X POST "${{ secrets.IMPORT_API_URL }}" \
            -H "Content-Type: application/json" \
            -H "x-lwd-competitor-secret: ${{ secrets.COMPETITOR_API_SECRET }}" \
            --data-binary @output/scrape-results.json)

          echo "Import API HTTP: $HTTP_CODE"
          cat import-response.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Import API HTTP error"
            exit 1
          fi

          OK=$(node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('import-response.json','utf8')); process.stdout.write(String(j.ok===true));")
          if [ "$OK" != "true" ]; then
            echo "Import API returned ok=false"
            exit 1
          fi

      - name: Upload backup JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scrape-results-${{ github.run_number }}
          path: output/scrape-results.json
          retention-days: 14
