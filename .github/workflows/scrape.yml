name: Competitor Scrape → WordPress DB

on:
  workflow_dispatch:
  schedule:
    - cron: '30 23 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            chromium-browser \
            fonts-liberation \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libnss3 \
            libxss1

      - name: Test MySQL connection
        run: node scripts/test-db.js
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_TABLE_PREFIX: wp_

      - name: Run scraper (all 6 sites → erbeaaustu)
        run: node scraper.js --summary --no-proxy --no-env --out=output/scrape-results.json
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          SCRAPER_THRESHOLD: 50
          DEEP_MAX_COMPS_PER_SITE: 3
          SCRAPER_PROXY: ''
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_TABLE_PREFIX: wp_

      - name: Upload backup JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scrape-results-${{ github.run_number }}
          path: output/scrape-results.json
          retention-days: 14
