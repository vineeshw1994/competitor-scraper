name: Scrape Ryse & Royalux (Test - No DB)

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
      
      - name: Scrape Ryse Competitions
        run: node scraper.js --site=rys --dry-run --summary
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
      
      - name: Scrape Royalux Competitions
        run: node scraper.js --site=royalux --dry-run --summary
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser